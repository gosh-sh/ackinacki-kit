
[workspace]
resolver = "3"
members = ["contracts", "root"]

package.version = "0.1.0"
package.edition = "2024"

[workspace.dependencies]
anyhow = "1.0.99"
async-trait = "0.1.89"
chrono = "0.4.42"
hex = "0.4.3"
num-bigint = "0.4.6"
serde = { version = "1.0.225", features = ["derive"] }
serde_json = "1.0.145"
sha2 = "0.10.9"
tokio = "1.47.1"
tracing = "0.1.41"
tvm_block = { git = "https://github.com/tvmlabs/tvm-sdk.git", tag = "v2.21.2.an" }
tvm_client = { git = "https://github.com/tvmlabs/tvm-sdk.git", tag = "v2.21.2.an", default-features = false, features = ["rustls-tls-webpki-roots", "std"] }
