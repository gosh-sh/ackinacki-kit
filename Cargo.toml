
[workspace]
resolver = "3"
members = ["contracts", "root", "shared"]

package.version = "0.3.3"
package.edition = "2024"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
base64 = "0.22.1"
chrono = "0.4"
hex = "0.4"
num-bigint = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tokio = "1.48"
tracing = "0.1"
tvm_block = { git = "https://github.com/tvmlabs/tvm-sdk.git", tag = "v2.24.7-rc.an" }
tvm_client = { git = "https://github.com/tvmlabs/tvm-sdk.git", tag = "v2.24.7-rc.an", default-features = false, features = ["rustls-tls-webpki-roots", "std"] }
