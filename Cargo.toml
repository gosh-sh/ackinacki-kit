
[workspace]
resolver = "3"
members = ["contracts", "root", "shared"]

package.version = "0.3.3"
package.edition = "2024"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
base64 = "0.22.1"
chrono = "0.4"
hex = "0.4"
num-bigint = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tokio = { version = "1", default-features = false }
tracing = "0.1"

tvm_block = { git = "https://github.com/tvmlabs/tvm-sdk.git", branch = "feature/wasm-web-2", default-features = false }
tvm_client = { git = "https://github.com/tvmlabs/tvm-sdk.git", branch = "feature/wasm-web-2", default-features = false }
